{% extends 'layout.html' %}
{% block content %}
<div class="card">
  <h2><i class="fas fa-edit"></i> Edit Product</h2>
  <form method="post" class="form-grid">
    <label>Name</label><input name="name" value="{{ product.name }}" required />
    <label>Price</label><input name="price" type="number" step="0.01" value="{{ product.price }}" required />
    <label>Description</label><input name="description" value="{{ product.description }}" />
    <label>Company</label><input name="company" value="{{ product.company or 'TechX Nologoe' }}" />
    <button type="submit" class="button-primary">Update Product</button>
    <a href="{{ url_for('admin_products') }}" class="button">Cancel</a>
  </form>
</div>
{% endblock %}
