{% extends 'layout.html' %}
{% block content %}
<div class="card">
  <h2>Sales Orders</h2>
  <table class="table-list">
    <tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr>
    {% for order in orders %}
    <tr>
      <td>{{ order.id }}</td>
      <td>{{ order.user_id }}</td>
      <td>${{ order.total }}</td>
      <td>{{ order.status }}</td>
      <td>{{ order.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
