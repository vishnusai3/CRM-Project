{% extends 'layout.html' %}
{% block content %}
<div class="card">
  <h2>Messaging</h2>
  <div class="message-list">
    {% for message in messages %}
    <div class="message {{ 'from-you' if message.role == 'customer' else 'from-admin' }}">
      <div class="message-text">{{ message.content }}</div>
      <div class="message-meta">{{ message.role }} | {{ message.created_at.strftime('%Y-%m-%d %H:%M') }}</div>
    </div>
    {% endfor %}
  </div>
  <form method="post" class="form-grid">
    <label>Tag a Product (Optional)</label>
    <select name="product_id">
      <option value="">Select Product</option>
      {% for product in products %}
      <option value="{{ product.id }}">{{ product.name }} - {{ product.company or 'TechX Nologoe' }}</option>
      {% endfor %}
    </select>
    <label>Send message to Admin</label>
    <textarea name="content" rows="3" required placeholder="Type your message here..."></textarea>
    <button type="submit" class="button-primary">Send</button>
  </form>
</div>
{% endblock %}
