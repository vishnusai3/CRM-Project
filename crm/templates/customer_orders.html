{% extends 'layout.html' %}
{% block content %}
<div class="card">
  <h2>Your Orders</h2>
  {% if orders %}
  <table class="table-list">
    <tr><th>ID</th><th>Total</th><th>Status</th><th>Date</th></tr>
    {% for order in orders %}
    <tr>
      <td>{{ order.id }}</td>
      <td>${{ order.total }}</td>
      <td>{{ order.status }}</td>
      <td>{{ order.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
    </tr>
    {% endfor %}
  </table>
  {% else %}
  <p>No orders yet.</p>
  {% endif %}
</div>
{% endblock %}
